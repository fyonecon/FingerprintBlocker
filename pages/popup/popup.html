<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<!--    <meta name="theme-color" content="#FFFACD">-->
    <title></title>
    <!--公共脚本-->
    <script src="../../common/config.js"></script>
    <script src="../../common/language.js"></script>
    <script src="../../common/md5.js"></script>
    <script src="../../common/func.js"></script>
    <link rel="stylesheet" href="../../common/theme.css">

</head>
<body class="body font-text select-none">
    <!--页面内容-->
    <div class="app app-popup scroll-y-style">

        <div class="settings-item-title center border-bottom">
            <a class="settings-item-a click font-blue" href="https://github.com/fyonecon/FingerprintBlocker" target="_blank" title="Github: https://github.com/fyonecon/FingerprintBlocker">
                <span class="language-span font-title" data-language_key="app_name"></span>
                <span class="settings-item-version font-mini font-gray" id="settings-item-title-version"></span>
            </a>
        </div>

        <div class="div-card ">
            <div class="card-li card-li-title">
                🎯 <span class="language-span font-text" data-language_key="block_fingerprint"></span>
            </div>
            <div class="card-li radio-group" id="radioGroup">
                <div class="radio-option">
                    <input type="radio" name="targetMode" id="modeDefault" value="off">
                    <label for="modeDefault">
                        <span class="language-span font-text click radio-span-click" data-language_key="block_fingerprint_off"></span>
                    </label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="targetMode" id="modeBase" value="base">
                    <label for="modeBase">
                        <span class="language-span font-text click radio-span-click" data-language_key="block_fingerprint_base"></span>
                    </label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="targetMode" id="modeBlank" value="on">
                    <label for="modeBlank">
                        <span class="language-span font-text click radio-span-click" data-language_key="block_fingerprint_on"></span>
                    </label>
                </div>
            </div>
            <div class="radio-alert hide" id="radioAlert">
                <span class="font-mini select-text font-gray" id="radio-block_fingerprint-alert" ></span>
            </div>
            <div class="card-li-bottom border-bottom"></div>
            <div class="card-li msg-li font-mini select-text break">
                <div><span class="language-span font-gray" data-language_key="help_msg_browser_set_block_fingerprint"></span></div>
            </div>
        </div>

    </div>

    <!--页面脚本-->
    <link rel="stylesheet" href="./popup.css">
    <script src="./setting_block_fingerprint.js"></script>
    <script src="./popup.js"></script>
</body>
</html>
